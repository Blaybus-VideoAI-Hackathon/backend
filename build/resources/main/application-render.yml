spring:
  application:
    name: hdb-backend
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
    open-in-view: false
    
  h2:
    console:
      enabled: false
    
  autoconfigure:
    exclude: []
    
server:
  port: ${PORT:8080}

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: INFO
