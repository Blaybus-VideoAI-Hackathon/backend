# 로컬/운영 MySQL 환경용 설정
# 이 프로필은 Render 배포에서는 사용하지 않습니다
# 주의: Render에서는 반드시 'render' 프로필을 사용하세요

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hdb_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
    
server:
  port: 8080

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
