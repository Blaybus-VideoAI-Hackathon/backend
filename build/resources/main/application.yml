spring:
  application:
    name: hdb-backend
  
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/hdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    
server:
  port: ${PORT:8080}

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
