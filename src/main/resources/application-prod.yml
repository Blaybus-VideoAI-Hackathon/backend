# Production 배포용 설정 (Aiven MySQL)
# Render 배포에서 사용하는 최종 프로필
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}?sslMode=REQUIRED&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: false

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:}

logging:
  level:
    com.example.hdb: INFO
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: DEBUG