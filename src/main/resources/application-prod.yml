# Production 배포용 설정 (Aiven MySQL)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: false

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:}

# Runway API 설정
runway:
  api:
    key: ${RUNWAY_API_KEY:}

# Cloudinary 설정 (이미지 영구 저장)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dbbkpdtqx}
  api-key: ${CLOUDINARY_API_KEY:497498544254817}
  api-secret: ${CLOUDINARY_API_SECRET:qT4oDifyTVx2rtlt7VehsWItAcI}

logging:
  level:
    com.example.hdb: INFO
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: DEBUG