# Render 배포용 설정 (Aiven MySQL)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

openai:
  api-key: ${OPENAI_API_KEY:}

kling:
  access-key: ${KLING_ACCESS_KEY:}
  secret-key: ${KLING_SECRET_KEY:}
  base-url: https://api.klingai.com

# Cloudinary 설정 (이미지 영구 저장)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dbbkpdtqx}
  api-key: ${CLOUDINARY_API_KEY:497498544254817}
  api-secret: ${CLOUDINARY_API_SECRET:qT4oDifyTVx2rtlt7VehsWItAcI}

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: DEBUG