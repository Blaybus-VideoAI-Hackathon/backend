# Render 배포용 설정 (Aiven MySQL) - DEPRECATED
# prod 프로필로 통합됨. 현재는 prod 프로필 사용 권장
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}?sslMode=REQUIRED&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

openai:
  api-key: ${OPENAI_API_KEY:}

kling:
  access-key: ${KLING_ACCESS_KEY:}
  secret-key: ${KLING_SECRET_KEY:}
  base-url: https://api.klingai.com

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    com.zaxxer.hikari: DEBUG
    org.hibernate.tool.schema.internal: DEBUG