server:
  port: ${PORT:8080}

spring:
  application:
    name: hdb-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

logging:
  level:
    com.example.hdb: INFO
    org.springframework.web: INFO

# 비디오 병합 설정
app:
  video:
    output:
      path: ${VIDEO_OUTPUT_PATH:/tmp/videos}
    base-url: ${VIDEO_BASE_URL:http://localhost:8080/videos}