# 로컬 개발에서 Aiven DB 연결 테스트용 설정
# 로컬 환경에서 원격 Aiven DB로 연결할 때 사용
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# ==========================================
# OpenAI API 설정 (기획 생성 전용)
# ==========================================
openai:
  api-key: ${OPENAI_API_KEY:}

# ==========================================
# ★★★ Leonardo AI 설정 (이미지 생성) ★★★
# ==========================================
leonardo:
  api-key: ${LEONARDO_API_KEY:}
  api-url: ${LEONARDO_API_URL:https://cloud.leonardo.ai/api/rest/v1}
  model-id: ${LEONARDO_MODEL_ID:7b592283-e8a7-4c5a-9ba6-d18c31f258b9}

logging:
  level:
    com.example.hdb: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    com.zaxxer.hikari: DEBUG
    org.hibernate.tool.schema.internal: DEBUG