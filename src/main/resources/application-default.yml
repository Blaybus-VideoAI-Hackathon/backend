# 로컬 개발용 기본 설정 (H2 메모리 DB)
# 별도 profile 지정 없을 때 사용되는 기본값
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        
  h2:
    console:
      enabled: true
      
  main:
    allow-bean-definition-overriding: true

# OpenAI API 설정 (로컬 테스트용)
openai:
  api-key: ${OPENAI_API_KEY:sk-test-key-for-development}

logging:
  level:
    com.example.hdb: DEBUG
    org.springframework.web: DEBUG